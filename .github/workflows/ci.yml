name: public-installer-validation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck
      - run: shellcheck scripts/*.sh scripts/lib/*.sh

  compose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: docker compose --env-file .env.example -f deploy/compose/lumen.yml config >/tmp/lumen.yml
      - run: docker compose --env-file .env.example -f deploy/compose/lumen-node.yml config >/tmp/lumen-node.yml
      - run: bash ./scripts/configure.sh --config /tmp/lumen-ci.env --non-interactive --dry-run
      - run: bash ./scripts/install.sh --config .env.example --dry-run
      - run: bash ./scripts/install-node.sh --control-plane-url https://panel.example.com --install-token-stdin --dry-run
      - run: bash ./scripts/backup.sh --config .env.example --allow-plaintext --dry-run
      - run: bash ./scripts/rollback.sh --config .env.example --state-dir /tmp/lumen-upgrade-state --force --dry-run

  secret-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ripgrep
      - run: bash ./scripts/secret-scan.sh .

  public-boundary:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: bash ./scripts/check-public-boundary.sh .

  release-manifest:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq openssl
      - run: bash ./scripts/validate-manifest.sh --allow-template release/manifest.template.json
      - run: |
          if bash ./scripts/validate-manifest.sh release/manifest.template.json; then
            echo "template manifest must not pass strict production validation" >&2
            exit 1
          fi
      - run: bash ./scripts/test-manifest-signature.sh
