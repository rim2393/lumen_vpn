name: public-installer-validation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck
      - run: shellcheck scripts/*.sh scripts/lib/*.sh

  compose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - run: docker compose --env-file .env.example -f deploy/compose/lumen.yml config >/tmp/lumen.yml
      - run: docker compose --env-file .env.example -f deploy/compose/lumen-node.yml config >/tmp/lumen-node.yml

  secret-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ripgrep
      - run: bash ./scripts/secret-scan.sh .

  release-manifest:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - run: jq -e '.schema == "lumen.release.v1"' release/manifest.template.json
