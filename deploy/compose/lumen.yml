name: lumen

x-app-env: &app-env
  TZ: ${TZ:-UTC}
  LUMEN_ENV: ${LUMEN_ENV:-production}
  PANEL_PUBLIC_URL: https://${PANEL_DOMAIN}
  SUBSCRIPTION_PUBLIC_URL: https://${SUBSCRIPTION_DOMAIN}
  DATABASE_URL: postgresql://lumen:${POSTGRES_PASSWORD}@postgres:5432/lumen
  LUMEN_DATABASE_URL: postgresql+asyncpg://lumen:${POSTGRES_PASSWORD}@postgres:5432/lumen
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  JWT_SECRET: ${JWT_SECRET}
  REFRESH_SECRET: ${REFRESH_SECRET}
  API_TOKEN_PEPPER: ${API_TOKEN_PEPPER}
  LUMEN_API_KEY_HASH_PEPPER: ${API_TOKEN_PEPPER}
  LUMEN_SESSION_HASH_PEPPER: ${SESSION_HASH_PEPPER:-${REFRESH_SECRET}}
  LUMEN_NODE_TOKEN_HASH_PEPPER: ${NODE_TOKEN_PEPPER:-${NODE_CA_SEED}}
  LUMEN_BOOTSTRAP_ADMIN_API_KEY: ${LUMEN_BOOTSTRAP_ADMIN_API_KEY}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET}
  NODE_CA_SEED: ${NODE_CA_SEED}
  MANIFEST_SIGNING_SEED: ${MANIFEST_SIGNING_SEED}
  FREE_NODE_LIMIT: ${FREE_NODE_LIMIT:-3}
  LUMEN_FREE_LICENSE_NODE_LIMIT: ${FREE_NODE_LIMIT:-3}
  LICENSE_MODE: ${LICENSE_MODE:-free}

services:
  postgres:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB: lumen
      POSTGRES_USER: lumen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumen -d lumen"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: ${REDIS_IMAGE}
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    image: ${LUMEN_API_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
      PORT: ${LUMEN_API_INTERNAL_PORT:-8000}
    volumes:
      - ${LUMEN_DATA_DIR:-/opt/lumen/data}/uploads:/var/lib/lumen/uploads
      - ${LUMEN_DATA_DIR:-/opt/lumen/data}/runtime:/var/lib/lumen/runtime
      - ${LUMEN_SECRETS_DIR:-/opt/lumen/secrets}:/run/lumen/secrets:ro
    ports:
      - "127.0.0.1:${LUMEN_API_PORT:-8080}:${LUMEN_API_INTERNAL_PORT:-8000}"

  worker:
    profiles:
      - worker
    image: ${LUMEN_API_IMAGE}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    command: ["lumen-api", "worker"]
    environment: *app-env
    volumes:
      - ${LUMEN_DATA_DIR:-/opt/lumen/data}/runtime:/var/lib/lumen/runtime
      - ${LUMEN_SECRETS_DIR:-/opt/lumen/secrets}:/run/lumen/secrets:ro

  web:
    image: ${LUMEN_WEB_IMAGE}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      TZ: ${TZ:-UTC}
      API_BASE_URL: https://${PANEL_DOMAIN}/api
      PORT: ${LUMEN_WEB_INTERNAL_PORT:-3000}
    ports:
      - "127.0.0.1:${LUMEN_WEB_PORT:-3000}:${LUMEN_WEB_INTERNAL_PORT:-3000}"

  subscription:
    image: ${LUMEN_SUBSCRIPTION_IMAGE}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      TZ: ${TZ:-UTC}
      API_INTERNAL_URL: http://api:${LUMEN_API_INTERNAL_PORT:-8000}
      SUBSCRIPTION_PUBLIC_URL: https://${SUBSCRIPTION_DOMAIN}
      PORT: ${LUMEN_SUBSCRIPTION_INTERNAL_PORT:-8080}
    ports:
      - "127.0.0.1:${LUMEN_SUBSCRIPTION_PORT:-8081}:${LUMEN_SUBSCRIPTION_INTERNAL_PORT:-8080}"

volumes:
  postgres_data:
  redis_data:
