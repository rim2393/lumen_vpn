name: lumen-node

services:
  node-agent:
    image: ${LUMEN_NODE_AGENT_IMAGE}
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ:-UTC}
      LUMEN_CONTROL_PLANE_URL: ${LUMEN_CONTROL_PLANE_URL:-https://panel.example.com}
      LUMEN_NODE_NAME: ${LUMEN_NODE_NAME:-manual-node}
      LUMEN_INSTALL_TOKEN_FILE: /run/lumen-node/install-token
      LUMEN_STATE_DIR: /var/lib/lumen-node
      LUMEN_DRY_RUN: ${LUMEN_DRY_RUN:-true}
      LUMEN_ENABLE_LIVE_SMOKE: ${LUMEN_ENABLE_LIVE_SMOKE:-false}
      LUMEN_XRAY_CONFIG_FILE: ${LUMEN_XRAY_CONFIG_FILE:-/var/lib/lumen-node/runtime/xray/config.json}
      LUMEN_XRAY_LOG_FILE: ${LUMEN_XRAY_LOG_FILE:-/var/lib/lumen-node/runtime/xray/xray.log}
      LUMEN_XRAY_RELOAD_MODE: ${LUMEN_XRAY_RELOAD_MODE:-process}
      LUMEN_HYSTERIA2_CONFIG_FILE: ${LUMEN_HYSTERIA2_CONFIG_FILE:-/var/lib/lumen-node/runtime/hysteria2/config.json}
      LUMEN_HYSTERIA2_LOG_FILE: ${LUMEN_HYSTERIA2_LOG_FILE:-/var/lib/lumen-node/runtime/hysteria2/sing-box.log}
      LUMEN_HYSTERIA2_PID_FILE: ${LUMEN_HYSTERIA2_PID_FILE:-/var/lib/lumen-node/runtime/hysteria2/sing-box.pid}
      LUMEN_HYSTERIA2_RELOAD_MODE: ${LUMEN_HYSTERIA2_RELOAD_MODE:-process}
      LUMEN_SHADOWSOCKS_CONFIG_FILE: ${LUMEN_SHADOWSOCKS_CONFIG_FILE:-/var/lib/lumen-node/runtime/shadowsocks/config.json}
      LUMEN_SHADOWSOCKS_LOG_FILE: ${LUMEN_SHADOWSOCKS_LOG_FILE:-/var/lib/lumen-node/runtime/shadowsocks/sing-box.log}
      LUMEN_SHADOWSOCKS_PID_FILE: ${LUMEN_SHADOWSOCKS_PID_FILE:-/var/lib/lumen-node/runtime/shadowsocks/sing-box.pid}
      LUMEN_SHADOWSOCKS_RELOAD_MODE: ${LUMEN_SHADOWSOCKS_RELOAD_MODE:-process}
      LUMEN_SHADOWSOCKS_PLUGIN_CONFIG_FILE: ${LUMEN_SHADOWSOCKS_PLUGIN_CONFIG_FILE:-/var/lib/lumen-node/runtime/shadowsocks-plugin/config.json}
      LUMEN_SHADOWSOCKS_PLUGIN_LOG_FILE: ${LUMEN_SHADOWSOCKS_PLUGIN_LOG_FILE:-/var/lib/lumen-node/runtime/shadowsocks-plugin/ssserver.log}
      LUMEN_SHADOWSOCKS_PLUGIN_PID_FILE: ${LUMEN_SHADOWSOCKS_PLUGIN_PID_FILE:-/var/lib/lumen-node/runtime/shadowsocks-plugin/ssserver.pid}
      LUMEN_SHADOWSOCKS_PLUGIN_RELOAD_MODE: ${LUMEN_SHADOWSOCKS_PLUGIN_RELOAD_MODE:-process}
      LUMEN_NAIVE_CONFIG_FILE: ${LUMEN_NAIVE_CONFIG_FILE:-/var/lib/lumen-node/runtime/naive/config.json}
      LUMEN_NAIVE_LOG_FILE: ${LUMEN_NAIVE_LOG_FILE:-/var/lib/lumen-node/runtime/naive/sing-box.log}
      LUMEN_NAIVE_PID_FILE: ${LUMEN_NAIVE_PID_FILE:-/var/lib/lumen-node/runtime/naive/sing-box.pid}
      LUMEN_NAIVE_RELOAD_MODE: ${LUMEN_NAIVE_RELOAD_MODE:-process}
      LUMEN_TUIC_CONFIG_FILE: ${LUMEN_TUIC_CONFIG_FILE:-/var/lib/lumen-node/runtime/tuic/config.json}
      LUMEN_TUIC_LOG_FILE: ${LUMEN_TUIC_LOG_FILE:-/var/lib/lumen-node/runtime/tuic/sing-box.log}
      LUMEN_TUIC_PID_FILE: ${LUMEN_TUIC_PID_FILE:-/var/lib/lumen-node/runtime/tuic/sing-box.pid}
      LUMEN_TUIC_RELOAD_MODE: ${LUMEN_TUIC_RELOAD_MODE:-process}
      LUMEN_WIREGUARD_CONFIG_FILE: ${LUMEN_WIREGUARD_CONFIG_FILE:-/var/lib/lumen-node/runtime/wireguard/lumen-wg.conf}
      LUMEN_WIREGUARD_RELOAD_MODE: ${LUMEN_WIREGUARD_RELOAD_MODE:-wg-quick}
      NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-1}
    volumes:
      - ${LUMEN_NODE_STATE_DIR:-/opt/lumen-node/state}:/var/lib/lumen-node
      - ${LUMEN_NODE_SECRETS_DIR:-/opt/lumen-node/secrets}:/run/lumen-node:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /lib/modules:/lib/modules:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - no-new-privileges:true
