name: lumen-node

services:
  node-agent:
    image: ${LUMEN_NODE_AGENT_IMAGE}
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ:-UTC}
      LUMEN_CONTROL_PLANE_URL: ${LUMEN_CONTROL_PLANE_URL:-https://panel.example.com}
      LUMEN_NODE_NAME: ${LUMEN_NODE_NAME:-manual-node}
      LUMEN_INSTALL_TOKEN_FILE: /run/lumen-node/install-token
      LUMEN_STATE_DIR: /var/lib/lumen-node
      LUMEN_DRY_RUN: ${LUMEN_DRY_RUN:-true}
      LUMEN_ENABLE_LIVE_SMOKE: ${LUMEN_ENABLE_LIVE_SMOKE:-false}
      LUMEN_XRAY_CONFIG_FILE: ${LUMEN_XRAY_CONFIG_FILE:-/var/lib/lumen-node/runtime/xray/config.json}
      LUMEN_XRAY_LOG_FILE: ${LUMEN_XRAY_LOG_FILE:-/var/lib/lumen-node/runtime/xray/xray.log}
      LUMEN_XRAY_RELOAD_MODE: ${LUMEN_XRAY_RELOAD_MODE:-process}
      NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-1}
    volumes:
      - ${LUMEN_NODE_STATE_DIR:-/opt/lumen-node/state}:/var/lib/lumen-node
      - ${LUMEN_NODE_SECRETS_DIR:-/opt/lumen-node/secrets}:/run/lumen-node:ro
      - /var/run/docker.sock:/var/run/docker.sock
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - no-new-privileges:true
